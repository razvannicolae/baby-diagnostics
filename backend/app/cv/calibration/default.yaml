# HSV reference calibration for baby diagnostic test strips.
# Each biomarker has a gradient of HSV reference points mapping to concentrations.
# Pad geometry is normalized (0-1) relative to the full captured image frame.
#
# Physical layout (camera view, portrait orientation — strip fills most of frame):
#
#   LEFT column  : pH strip — tall vertical card with 4 stacked color pads.
#                  Top-to-bottom pad colors: olive/green, white, blue, yellow/gold.
#                  flip_sub_pads: true reverses sampling order so row indices match
#                  the reference chart (chart top = physical bottom of strip).
#
#   RIGHT-TOP    : creatinine — single square pad (yellow/orange when reacted).
#
#   RIGHT-BOTTOM : albumin   — single square pad (white→blue gradient when reacted).
#
# sub_pads: N — biomarker has N stacked color rows; each gradient entry uses
#   `colors: [[H,S,V], ...]` (one per row) instead of a single `hsv:`.
# flip_sub_pads: true — physical strip is inverted; reverses row sampling order so
#   it matches the reference chart order (top-of-chart = bottom of physical strip).
# scale_type: ordinal — categorical scale; uses `normal_category` to determine
#   flagging. If normal_category is omitted, values are never flagged.
#
# NOTE: All region values are approximate — recalibrate against actual captured images.

# White-reference points on the strip backing. Used for per-channel white
# balance: the analyzer samples these, takes the median, and scales each
# channel so the median reads (255, 255, 255). This removes ambient lighting
# color cast so camera-captured pads can be compared to the printed-chart
# reference values below. Points are in the clean gaps between pH pads.
white_reference_points:
  - [0.18, 0.247]   # strip backing between pH pad 1 and pad 2
  - [0.18, 0.465]   # strip backing between pH pad 2 and pad 3
  - [0.18, 0.682]   # strip backing between pH pad 3 and pad 4

pad_geometry:
  # Sample points as [x, y] fractions of the captured square image.
  # These match the dot positions shown in the camera overlay (CameraView.tsx).
  # A small area around each point is sampled (see SAMPLE_RADIUS in analyzer.py).
  - name: pH
    sample_points:
      - [0.18, 0.139]   # pad 1 (top of strip)
      - [0.18, 0.356]   # pad 2
      - [0.18, 0.574]   # pad 3
      - [0.18, 0.791]   # pad 4 (bottom of strip)
  - name: creatinine
    sample_points:
      - [0.71, 0.235]   # single pad
  - name: albumin
    sample_points:
      - [0.71, 0.665]   # single pad

biomarkers:
  pH:
    unit: ""
    normal_min: 6.0
    normal_max: 8.0
    gradient:
      # rgb_colors: [pad1, pad2, pad3, pad4]
      # pad1 = rightmost square in reference chart (closest to pH number label).
      # Matching uses RGB Euclidean distance (see color_matching.py).
      # Colors picked from clinical reference chart (Image 6).
      - value: 0.0
        label: "0"
        rgb_colors:
          - [218,  78, 130]   # #DA4E82  pad1: hot pink/magenta
          - [230, 120,  42]   # #E6782A  pad2: orange
          - [ 58, 155, 165]   # #3A9BA5  pad3: teal

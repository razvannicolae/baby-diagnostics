  creatinine:
    unit: ""
    scale_type: ordinal
    normal_category: "3+"
    # rgb: values picked from clinical reference chart (Image 5).
    # Matching uses plain RGB Euclidean distance (see color_matching.py).
    gradient:
      - rgb: [220, 230, 143]   # #DCE68F — very light chartreuse
        value: 1
        label: "1+"
      - rgb: [163, 193, 113]   # #A3C171 — medium yellow-green
        value: 2
        label: "2+"
      - rgb: [133, 165, 93]    # #85A55D — darker olive-green
        value: 3
        label: "3+"

  albumin:
    unit: ""
    scale_type: ordinal
    normal_category: "normal"   # normal = no albumin; 1+/2+/3+ are flagged
    # rgb: values picked from clinical reference chart (Image 4).
    # Matching uses plain RGB Euclidean distance (see color_matching.py).
